<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentBridge Mobile Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
      overflow: hidden;
      background: #eef2f8;
    }

    .preview-layout {
      width: min(430px, 100%);
      height: min(844px, calc(100svh - 32px));
    }

    .phone {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(10, 45, 115, 0.12);
      border-radius: 22px;
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(10, 45, 115, 0.18);
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 520px) {
      body {
        display: block;
        padding: 0;
        background: #ffffff;
      }

      .preview-layout {
        width: 100%;
        height: 100svh;
      }

      .phone {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      iframe {
        width: 100%;
        height: 100svh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main class="preview-layout">
    <div class="phone">
      <iframe src="app.html" title="TalentBridge mobile application"></iframe>
    </div>
  </main>
</body>
</html>
